pluginGroup = com.example.testplugin
pluginName = Http Request Tool
pluginVersion = 1.0.0

platformType = IC
platformVersion = 2024.1

gradleVersion = 8.13

kotlin.stdlib.default.dependency = false

# Gradle runtime
org.gradle.jvmargs = -Xmx2048m -Dfile.encoding=UTF-8
org.gradle.daemon = true
org.gradle.parallel = true
org.gradle.caching = true

# Network timeouts for dependency download
systemProp.org.gradle.internal.http.connectionTimeout = 60000
systemProp.org.gradle.internal.http.socketTimeout = 120000

org.gradle.java.home=/Users/jwz/Work/Collect/jdk-17.0.16.jdk/Contents/Home

# Uncomment and adjust if you need a local proxy
# systemProp.http.proxyHost = 127.0.0.1
# systemProp.http.proxyPort = 7890
# systemProp.https.proxyHost = 127.0.0.1
# systemProp.https.proxyPort = 7890

# Uncomment if the proxy should bypass localhost
# systemProp.http.nonProxyHosts = localhost|127.0.0.1
